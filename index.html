<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo/Icon_SolidBlack_Tight.svg" type="image/svg+xml" />
    <link
      rel="icon"
      href="/logo/Icon_ReverseWhite_Tight.svg"
      type="image/svg+xml"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      href="/logo/Icon_SolidBlack_Tight.svg"
      type="image/svg+xml"
      media="(prefers-color-scheme: light)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Alpine Earthworks — excavation, grading, and site preparation for residential and commercial projects."
    />
    <title>Alpine Earthworks | Excavation & Site Work</title>
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/vvk0njt.css" />
  </head>
  <body>
    <!-- Netlify Forms: static registration (field names must match React form POST) -->
    <form
      name="quote"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      class="netlify-form-register"
      aria-hidden="true"
    >
      <input type="hidden" name="form-name" value="quote" />
      <label>Do not fill this in: <input name="bot-field" /></label>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="details"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
